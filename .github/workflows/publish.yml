name: Publish to pub.dev

on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run (do not actually publish)'
        required: true
        default: true
        type: boolean

# Publish to pub.dev when manually triggered
# Requires PUBDEV_CREDENTIALS secret to be set
jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Run tests
        run: dart test

      - name: Validate pubspec
        run: dart pub publish --dry-run

      - name: Publish (dry run)
        if: ${{ inputs.dry-run }}
        run: dart pub publish --dry-run

      - name: Publish
        if: ${{ !inputs.dry-run }}
        run: dart pub publish --force
        env:
          PUB_TOKEN: ${{ secrets.PUBDEV_CREDENTIALS }}

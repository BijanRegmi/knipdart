name: knipdart
description: Find unused exports in Dart/Flutter projects. AST-based static analysis tool inspired by knip.dev.
version: 0.2.0
repository: https://github.com/BijanRegmi/knipdart
issue_tracker: https://github.com/BijanRegmi/knipdart/issues
topics:
  - linter
  - static-analysis
  - dead-code
  - unused-exports
  - cli

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  analyzer: ">=7.0.0 <14.0.0"
  args: ^2.4.0
  glob: ^2.1.0
  path: ^1.8.0
  yaml: ^3.1.0

dev_dependencies:
  test: ^1.24.0
  lints: ^5.0.0

executables:
  knipdart: knipdart
